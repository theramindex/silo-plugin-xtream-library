name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify plugin
        run: ./scripts/verify-release.sh

      - name: Verify tagged version
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./scripts/verify-release.sh "${GITHUB_REF_NAME#v}" --version-only

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build versioned binary and package upload artifact
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi

          mkdir -p dist
          BIN="dispatcharr-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"

          CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" \
            go build -trimpath -ldflags "-s -w -X main.buildVersion=${VERSION}" -o "dist/${BIN}" .

          go run ./cmd/package-upload \
            -binary "dist/${BIN}" \
            -version "${VERSION}" \
            -goos "${{ matrix.goos }}" \
            -goarch "${{ matrix.goarch }}" \
            -plugin-id "silo.ramindex.dispatcharr"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-dist
          merge-multiple: true

      - name: Generate combined checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-dist
          sha256sum * | sort -k2 > checksums.txt

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          NAME="${GITHUB_REF_NAME}"
          PRERELEASE="false"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: release-dist/*

  catalog:
    name: Update Silo catalog
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Check catalog credentials
        id: catalog-token
        shell: bash
        env:
          CATALOG_PUSH_TOKEN: ${{ secrets.CATALOG_PUSH_TOKEN }}
        run: |
          if [[ -n "${CATALOG_PUSH_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CATALOG_PUSH_TOKEN is not configured; skipping catalog update."
          fi

      - name: Checkout catalog
        if: steps.catalog-token.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: theramindex/silo-plugins
          token: ${{ secrets.CATALOG_PUSH_TOKEN }}
          path: catalog-repo

      - name: Setup Node
        if: steps.catalog-token.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download published checksums
        if: steps.catalog-token.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${GITHUB_REF_NAME}" --pattern checksums.txt --dir release-catalog

      - name: Update and validate catalog
        if: steps.catalog-token.outputs.enabled == 'true'
        run: |
          node scripts/update-catalog.mjs \
            --catalog-dir catalog-repo \
            --version "${GITHUB_REF_NAME#v}" \
            --checksums release-catalog/checksums.txt
          node catalog-repo/scripts/validate-catalog.mjs

      - name: Commit catalog update
        if: steps.catalog-token.outputs.enabled == 'true'
        shell: bash
        run: |
          if git -C catalog-repo diff --quiet; then
            echo "Catalog already matches ${GITHUB_REF_NAME}."
            exit 0
          fi
          git -C catalog-repo config user.name ramindex-ci
          git -C catalog-repo config user.email github@ramindex.org
          git -C catalog-repo add manifest.json checksums.txt
          git -C catalog-repo commit -m "Update Dispatcharr plugin to ${GITHUB_REF_NAME#v}"
          git -C catalog-repo push origin HEAD:main
